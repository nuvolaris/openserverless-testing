name: AllTests
run-name: Testing openserverless-testing branch/tag ${{ github.ref_name}}

on:
  push:
    tags:
    - '*-*'
    branches-ignore:
    - '*'

env:
  TEST_TAG: ${{ github.ref_name }}
  OPS_REPO: ${{ vars.OPS_REPO || 'https://github.com/apache/openserverless-task' }}
  OPS_BRANCH: ${{ vars.OPS_BRANCH || 'main' }}
  OPERATOR_IMAGE_REPO: ${{ vars.OPERATOR_IMAGE || 'apache/openserverless-operator' }}

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    # temporary disabled
    #if: false # skip for now
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare OPS_ROOT and operator image override
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git clone --depth 1 --branch "$OPS_BRANCH" "$OPS_REPO" _opsroot
          . tests/lib/selector.sh
          resolve_test_selector "$TEST_TAG"
          OPERATOR_IMAGE_REPO_EFFECTIVE="$OPERATOR_IMAGE_REPO"
          TAG_METADATA="$(git for-each-ref "refs/tags/${TEST_TAG}" --format='%(contents)')"
          if test -n "$TAG_METADATA"
          then
            TAG_OPERATOR_IMAGE="$(printf '%s' "$TAG_METADATA" | jq -r '.operator_image // empty' 2>/dev/null || true)"
            if test -n "$TAG_OPERATOR_IMAGE"
            then
              OPERATOR_IMAGE_REPO_EFFECTIVE="$TAG_OPERATOR_IMAGE"
            fi
          fi
          if test -n "$TEST_VERSION"
          then
            OPERATOR_IMAGE_OVERRIDE="${OPERATOR_IMAGE_REPO_EFFECTIVE}:${TEST_VERSION}"
            jq --arg img "$OPERATOR_IMAGE_OVERRIDE" \
              '.config.images.operator = $img' \
              _opsroot/opsroot.json > _opsroot/opsroot.json.tmp
            mv _opsroot/opsroot.json.tmp _opsroot/opsroot.json
            echo "Operator image override: $OPERATOR_IMAGE_OVERRIDE"
            echo "OPERATOR_IMAGE_OVERRIDE=$OPERATOR_IMAGE_OVERRIDE" >> "$GITHUB_ENV"
          else
            echo "No operator image override requested for $TEST_TAG"
          fi
          echo "OPS_ROOT=$(pwd)/_opsroot" >> "$GITHUB_ENV"
      # Commented out -- GKE plugin not needed without GCP environment:
      # - name: Add Missing plugin
      #   run: |
      #     # fix for missing auth-plugin
      #     echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
      #     curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
      #     sudo apt update
      #     sudo apt-get install google-cloud-sdk-gke-gcloud-auth-plugin kubectl
      #   if: ${{ startsWith(github.ref_name, 'gke') }}
      - name: Install ops
        run: |
          curl -sL n7s.co/get-ops | bash
          ops -t > /dev/null
      - name: Install autossh
        run: |
          sudo apt-get update
          sudo apt-get install -y autossh
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_KEY: op://OpenServerless/ops_testing_ssh/public key
          ID_RSA_B64: op://OpenServerless/TESTING/ID_RSA_B64
          K8S_KUBECONFIG_B64: op://OpenServerless/TESTING/K8S_KUBECONFIG_B64
          K3S_AMD_APIHOST: op://OpenServerless/TESTING/K3S_AMD_APIHOST
          K3S_ARM_APIHOST: op://OpenServerless/TESTING/K3S_ARM_APIHOST
          K8S_APIHOST: op://OpenServerless/TESTING/K8S_APIHOST
          APIHOST: op://OpenServerless/TESTING/APIHOST
      - name: Support Action (if requested)
        run: .github/supportAction.sh
      - name: Wait for Support (if requested)
        run: .github/waitIfSupport.sh
      - name: Run GitHub Test Suite
        run: tests/run-gh-suite.sh "$TEST_TAG"

  test-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: powershell
    needs: test-linux
    #if: ${{ ! startsWith(github.ref_name, 'kind') }}
    # temporary disabled
    if: false # skip for now
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Install Git (which includes Git Bash)
        # Commented out -- GKE plugin not needed without GCP environment:
        # - name: 'Set up Cloud SDK'
        #   uses: 'google-github-actions/setup-gcloud@v1'
        #   if: ${{ startsWith(github.ref_name, 'gke') }}
        # - name: 'Update plugin'
        #   if: ${{ startsWith(github.ref_name, 'gke') }}
        #   run: gcloud components install gke-gcloud-auth-plugin
      - name: Install ops
        shell: powershell
        run: |
          irm n7s.co/get-ops-exe | iex
      - name: Add ops to path for runner
        shell: bash
        run: |
          OPS_BIN_PATH=$HOME/.local/bin/
          echo "PATH=$OPS_BIN_PATH:$PATH" >> $GITHUB_ENV
      - name: Check Ops
        shell: bash
        run: |
          ops -info
          ops -t > /dev/null
      - name: Ops Update
        shell: bash
        run: |
          ops -update
          ops -info
      - name: Load secrets from 1Password
        uses: shyim/1password-load-secrets-action@v1
        with:
          export: true
          mask-secrets: true
          secrets: |
            op://OpenServerless/TESTING/NGROK_PASSWORD
            op://OpenServerless/TESTING/ID_RSA_B64
            op://OpenServerless/TESTING/K8S_KUBECONFIG_B64
            op://OpenServerless/TESTING/K3S_AMD_APIHOST
            op://OpenServerless/TESTING/K3S_ARM_APIHOST
            op://OpenServerless/TESTING/K8S_APIHOST
            op://OpenServerless/TESTING/APIHOST
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Debug Action (if requested)
        shell: bash
        run:  .github/debugAction.sh
      - name: Wait for Debug (if requested)
        shell: bash
        run: .github/waitIfDebug.sh
      - name: Run GitHub Test Suite
        shell: bash
        run: tests/run-gh-suite.sh "$TEST_TAG"

  test-mac:
    runs-on: macOS-14
    defaults:
      run:
        shell: bash
    #if: ${{ ! startsWith(github.ref_name, 'kind') }}
    # temporary disabled
    if: false # skip for now
    needs: test-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Commented out -- GKE plugin not needed without GCP environment:
      # - name: 'Set up Cloud SDK'
      #   uses: 'google-github-actions/setup-gcloud@v1'
      #   if: ${{ startsWith(github.ref_name, 'gke') }}
      # - name: 'Update plugin'
      #   if: ${{ startsWith(github.ref_name, 'gke') }}
      #   run: gcloud components install gke-gcloud-auth-plugin
      - name: Install ops
        run: |
          curl -sL bit.ly/get-ops | /bin/bash
          source ~/.bashrc
          ops -info
          ops -t > /dev/null
          OPS_BIN_PATH=$(ops -i | grep "OPS_HOME" | awk -v FS=: '{print $2}' | tr -d " ")/bin
          echo "PATH=$OPS_BIN_PATH:$PATH" >> $GITHUB_ENV
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_KEY: op://OpenServerless/ops_testing_ssh/public key
          NGROK_PASSWORD: op://OpenServerless/TESTING/NGROK_PASSWORD
          ID_RSA_B64: op://OpenServerless/TESTING/ID_RSA_B64
          K8S_KUBECONFIG_B64: op://OpenServerless/TESTING/K8S_KUBECONFIG_B64
          K3S_AMD_APIHOST: op://OpenServerless/TESTING/K3S_AMD_APIHOST
          K3S_ARM_APIHOST: op://OpenServerless/TESTING/K3S_ARM_APIHOST
          K8S_APIHOST: op://OpenServerless/TESTING/K8S_APIHOST
          APIHOST: op://OpenServerless/TESTING/APIHOST
      - name: Debug Action (if requested)
        run: .github/debugAction.sh
      - name: Wait for Debug (if requested)
        run: .github/waitIfDebug.sh
      - name: Run GitHub Test Suite
        run: tests/run-gh-suite.sh "$TEST_TAG"
