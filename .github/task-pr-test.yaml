name: Task PR Test
run-name: "Task PR #${{ github.event.client_payload.pr_number }} on ${{ github.event.client_payload.test_tag || github.event.client_payload.selector || github.event.client_payload.platform }}"

on:
  repository_dispatch:
    types: [task-pr-test]

env:
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  PR_REF: ${{ github.event.client_payload.pr_ref }}
  PR_SHA: ${{ github.event.client_payload.pr_sha }}
  TASK_REPO: ${{ github.event.client_payload.task_repo }}
  TEST_TAG: ${{ github.event.client_payload.test_tag || github.event.client_payload.selector || github.event.client_payload.platform }}
  TEST_NAME: ${{ github.event.client_payload.test_name || '' }}
  TEST_HASH: ${{ github.event.client_payload.test_hash || '' }}
  OPS_BRANCH: main
  NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}

jobs:
  task-pr-test:
    name: "Test task PR #${{ github.event.client_payload.pr_number }}"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout testing repo
        uses: actions/checkout@v4

      - name: Clone task PR branch
        run: |
          git clone --branch "$PR_REF" \
            "https://github.com/$TASK_REPO.git" _task
          git -C _task checkout "$PR_SHA"

      - name: Verify task checkout
        run: |
          ls _task/opsfile.yml _task/opsroot.json
          git -C _task rev-parse HEAD

      - name: Show requested test context
        run: |
          echo "PR number: $PR_NUMBER"
          echo "PR ref: $PR_REF"
          echo "PR sha: $PR_SHA"
          echo "Requested test tag: $TEST_TAG"
          if [[ -n "$TEST_NAME" ]]; then
            echo "Requested test name: $TEST_NAME"
          fi
          if [[ -n "$TEST_HASH" ]]; then
            echo "Requested test hash: $TEST_HASH"
          fi

      - name: Set OPS_ROOT
        run: echo "OPS_ROOT=$(pwd)/_task" >> "$GITHUB_ENV"

      - name: Install ops
        run: |
          curl -sL bit.ly/get-ops | bash
          ops -info
          ops -t > /dev/null

      - name: Install autossh
        run: |
          sudo apt-get update
          sudo apt-get install -y autossh

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_KEY: op://OpenServerless/ops_testing_ssh/public key
          NGROK_PASSWORD: op://OpenServerless/TESTING/NGROK_PASSWORD
          ID_RSA_B64: op://OpenServerless/TESTING/ID_RSA_B64
          K8S_KUBECONFIG_B64: op://OpenServerless/TESTING/K8S_KUBECONFIG_B64
          K3S_AMD_APIHOST: op://OpenServerless/TESTING/K3S_AMD_APIHOST
          K3S_ARM_APIHOST: op://OpenServerless/TESTING/K3S_ARM_APIHOST
          K8S_APIHOST: op://OpenServerless/TESTING/K8S_APIHOST
          APIHOST: op://OpenServerless/TESTING/APIHOST

      - name: Run GitHub Test Suite
        run: tests/run-gh-suite.sh "$TEST_TAG"
